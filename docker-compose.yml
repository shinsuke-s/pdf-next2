services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdf-next-frontend
    command: sh -c "npm install && npm run db:push && npm run dev -- --hostname 0.0.0.0 --port 3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: file:./prisma/dev.db
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      - ./node_modules:/app/node_modules
    depends_on:
      - db

  db:
    image: alpine:3.20
    container_name: pdf-next-db
    working_dir: /workspace
    command: sh -c "mkdir -p prisma && touch prisma/dev.db && tail -f /dev/null"
    volumes:
      - ./:/workspace
